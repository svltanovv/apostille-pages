<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Apostille Verification System</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://unpkg.com/qr-scanner@1.4.2/qr-scanner.umd.min.js"></script>
</head>
<body>
<header class="header">
  <div class="header-container" style="display: flex; align-items: center; gap: 15px;">
    <img src="hcch.jpg" alt="HCCH Logo" style="height: 50px; background: white; padding: 2px; border-radius: 4px;">
    <div class="header-text">
      <h1 style="color: #ffffff; margin: 0; font-size: 22px;">E-APOSTILLE GLOBAL</h1>
      <p class="trn" data-trn-key="sys_title" style="margin: 0; font-size: 11px; color: #ddd; font-weight: bold;">VERIFICATION SYSTEM</p>
    </div>
  </div>
</header>

<main class="content">
  <form class="verification-form" id="searchForm">
    <div style="text-align:center; margin-bottom:15px;">
        <h2 class="trn" data-trn-key="verify_doc" style="font-size: 18px; color: #0b3d91;">Verify Document</h2>
        <p class="trn" data-trn-key="verify_sub" style="font-size: 13px; color: #666;">Enter details to verify authenticity</p>
    </div>

    <label class="trn" data-trn-key="ap_num">Apostille Number</label>
    <input type="text" id="apostille-input" placeholder="APO-XXXX-XXXX" required>
    
    <label class="trn" data-trn-key="date_issue">Date of Issue</label>
    <input type="date" id="date-input" required>
    
    <label class="trn" data-trn-key="ref_code">Referral Code (Optional)</label>
    <input type="text" id="referral-input" placeholder="Code">

    <button type="submit" class="btn btn-main trn" data-trn-key="verify_btn">Verify Document</button>

    <div style="display: flex; gap: 10px; margin-top: 10px;">
        <button type="button" id="scan-qr-btn" class="btn btn-secondary trn" data-trn-key="scan_qr" style="flex: 1;">📷 Scan QR-code</button>
        <a href="samples.html" class="btn btn-secondary trn" data-trn-key="samples" style="flex: 1; text-align: center; text-decoration: none; padding-top: 10px;">Samples</a>
    </div>
    
    <a href="index.html" class="btn btn-secondary trn" data-trn-key="back_home" style="margin-top: 10px; text-align: center; width: 100%; text-decoration: none; padding-top: 10px;">← Back to Home</a>
  </form>
</main>

<div id="qr-modal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.95); z-index:9999; flex-direction:column; justify-content:center; align-items:center;">
    <div style="position:absolute; top:20px; right:20px; z-index:10000;">
        <button id="close-qr" style="background:white; border:none; border-radius:50%; width:40px; height:40px; font-size:24px;">&times;</button>
    </div>
    <h3 style="color:white; margin-bottom:20px;">Scan QR Code</h3>
    <div style="position: relative; width: 100%; max-width: 500px; aspect-ratio: 1/1; overflow: hidden; border-radius: 12px; border: 2px solid white;">
        <video id="qr-video" style="width: 100%; height: 100%; object-fit: cover;"></video>
        <div style="position: absolute; top: 0; left: 0; right: 0; bottom: 0; box-shadow: 0 0 0 100vmax rgba(0,0,0,0.5); pointer-events: none;"></div>
    </div>
    <p id="qr-status" style="color: #ccc; margin-top: 20px; text-align: center;"></p>
</div>

<script>
    const verifyLangs = {
      en: { sys_title: "VERIFICATION SYSTEM", verify_doc: "Verify Document", verify_sub: "Enter details to verify authenticity", ap_num: "Apostille Number", date_issue: "Date of Issue", ref_code: "Referral Code (Optional)", verify_btn: "Verify Document", scan_qr: "📷 Scan QR-code", samples: "Samples", back_home: "← Back to Home" },
      fr: { sys_title: "SYSTÈME DE VÉRIFICATION", verify_doc: "Vérifier le document", verify_sub: "Entrez les détails pour vérifier l'authenticité", ap_num: "Numéro d'apostille", date_issue: "Date de délivrance", ref_code: "Code de référence (Optionnel)", verify_btn: "Vérifier le document", scan_qr: "📷 Scanner le code QR", samples: "Exemples", back_home: "← Retour à l'accueil" },
      de: { sys_title: "VERIFIZIERUNGSSYSTEM", verify_doc: "Dokument überprüfen", verify_sub: "Geben Sie Details zur Überprüfung ein", ap_num: "Apostillennummer", date_issue: "Ausstellungsdatum", ref_code: "Empfehlungscode (Optional)", verify_btn: "Dokument überprüfen", scan_qr: "📷 QR-Code scannen", samples: "Muster", back_home: "← Zurück zur Startseite" },
      es: { sys_title: "SISTEMA DE VERIFICACIÓN", verify_doc: "Verificar documento", verify_sub: "Ingrese detalles para verificar autenticidad", ap_num: "Número de Apostilla", date_issue: "Fecha de emisión", ref_code: "Código de referencia (Opcional)", verify_btn: "Verificar documento", scan_qr: "📷 Escanear código QR", samples: "Ejemplos", back_home: "← Volver al inicio" },
      pt: { sys_title: "SISTEMA DE VERIFICAÇÃO", verify_doc: "Verificar documento", verify_sub: "Insira os detalhes para verificar a autenticidade", ap_num: "Número da Apostila", date_issue: "Data de emissão", ref_code: "Código de referência (Opcional)", verify_btn: "Verificar documento", scan_qr: "📷 Digitalizar código QR", samples: "Amostras", back_home: "← Voltar ao início" }
    };

    window.onload = () => {
      const savedLang = localStorage.getItem('appLang') || 'en';
      document.querySelectorAll('.trn').forEach(el => {
        const key = el.getAttribute('data-trn-key');
        if (verifyLangs[savedLang] && verifyLangs[savedLang][key]) {
            el.textContent = verifyLangs[savedLang][key];
        }
      });
    };

    document.getElementById("searchForm").addEventListener("submit", function(e) {
        e.preventDefault();
        const apostille = document.getElementById("apostille-input").value.trim();
        const date = document.getElementById("date-input").value;
        const referral = document.getElementById("referral-input").value.trim();
        
        if(apostille && date) {
            let url = `result.html?apostille=${encodeURIComponent(apostille)}&date=${encodeURIComponent(date)}`;
            if(referral) url += `&ref=${encodeURIComponent(referral)}`;
            window.location.href = url;
        }
    });

    const scanBtn = document.getElementById("scan-qr-btn");
    const modal = document.getElementById("qr-modal");
    const closeBtn = document.getElementById("close-qr");
    const videoElem = document.getElementById("qr-video");
    const statusText = document.getElementById("qr-status");
    let scanner = null;

    QrScanner.WORKER_PATH = 'https://unpkg.com/qr-scanner@1.4.2/qr-scanner-worker.min.js';

    scanBtn.addEventListener("click", () => {
        modal.style.display = "flex";
        statusText.innerText = "Starting camera...";
        startScanner();
    });

    closeBtn.addEventListener("click", stopScanner);

    async function startScanner() {
        if (location.protocol !== "https:" && location.hostname !== "localhost") {
            statusText.style.color = "red";
            statusText.innerText = "Error: Camera needs HTTPS!";
            return;
        }
        try {
            scanner = new QrScanner(videoElem, result => {
                const text = result.data || result; 
                statusText.style.color = "#4caf50";
                statusText.innerText = "Found! Redirecting...";
                stopScanner();
                
                if (text.includes("apostille=") && text.includes("date=")) {
                    let redirectUrl = text;
                    if(redirectUrl.includes("index.html")) redirectUrl = redirectUrl.replace("index.html", "result.html");
                    window.location.href = redirectUrl;
                } else {
                    alert("QR code scanned: " + text + "\nNot an apostille document.");
                }
            }, { highlightScanRegion: true, highlightCodeOutline: true });
            await scanner.start();
            statusText.innerText = "Point camera at QR code";
        } catch (e) {
            statusText.style.color = "red";
            statusText.innerText = "Camera Error: " + e;
        }
    }

    function stopScanner() {
        if (scanner) { scanner.stop(); scanner.destroy(); scanner = null; }
        modal.style.display = "none";
    }
</script>
</body>
</html>
